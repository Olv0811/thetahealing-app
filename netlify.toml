# Netlify 配置文件
[build]
  command = "npm ci && npm run build"
  publish = "celestial-sanctuary/dist"
  base = "Thetahealing"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000

# 环境变量
[context.production]
  environment = { NODE_VERSION = "18" }

[context.deploy-preview]
  environment = { NODE_VERSION = "18" }

[context.branch-deploy]
  environment = { NODE_VERSION = "18" }

# 重定向规则（解决SPA路由问题）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
