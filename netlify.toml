# Netlify 配置文件
[build]
  command = "npm ci && npm run build"
  publish = "dist"
  base = "."

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  VITE_TAILWIND_MODE = "build"

[context.production.environment]
  VITE_SUPABASE_URL = "your_production_supabase_url"
  VITE_SUPABASE_ANON_KEY = "your_production_anon_key"
  VITE_GLM_API_KEY = "your_production_glm_key"

[context.deploy-preview.environment]
  VITE_SUPABASE_URL = "your_preview_supabase_url"
  VITE_SUPABASE_ANON_KEY = "your_preview_anon_key"
  VITE_GLM_API_KEY = "your_preview_glm_key"

# SPA路由重定向
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200